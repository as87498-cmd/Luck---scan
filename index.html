<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luck Loop Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background: #02050a; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        .page { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; }
        .active { display: flex !important; }
        .box { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; border: 2px solid gold; width: 80%; }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; }
        .btn { width: 95%; padding: 15px; background: gold; color: black; font-weight: bold; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; }
        img { width: 85%; border-radius: 15px; border: 2px solid gold; margin: 10px; }
        canvas { background: #1a2e1e; border: 2px solid #444; display: none; }
    </style>
</head>
<body>

    <div id="p1" class="page active">
        <div class="box">
            <h1 style="color:gold;">LUCK LOOP</h1>
            <input type="text" id="n" placeholder="Aapka Naam">
            <input type="tel" id="m" placeholder="Mobile Number">
            <button class="btn" onclick="go2()">ENTER GAME</button>
        </div>
    </div>

    <div id="p2" class="page">
        <img src="0be375d6-cfec-4bc4-a707-c3c863b278e0.png">
        <p>Loading Game Hub...</p>
    </div>

    <div id="p3" class="page">
        <h2>SELECT GAME</h2>
        <button class="btn" onclick="start('a')" style="margin-bottom:10px;">🏹 ARCHERY</button>
        <button class="btn" onclick="start('j')">🚀 NEON JUMP</button>
    </div>

    <div id="p4" class="page">
        <h2 id="sc">Score: 0%</h2>
        <canvas id="c"></canvas>
    </div>

    <div id="p5" class="page">
        <img src="00d36208-3e40-4401-bb90-a76b38fa74cf.png">
        <p>Wait... <span id="tm">5</span>s</p>
    </div>

    <div id="p6" class="page">
        <h1 style="color:gold;">VICTORY! 🎉</h1>
        <p id="fm"></p>
        <button class="btn" onclick="sendWA()">GET DISCOUNT</button>
    </div>

<script>
    let n, mob, s=0, gA=false, mode='', ty=100, td=1, ax=50, ash=false, py=320, pvy=0, ox=350;
    const can = document.getElementById('c'), ctx = can.getContext('2d');

    function go2() {
        n = document.getElementById('n').value; mob = document.getElementById('m').value;
        if(n && mob.length==10) {
            show('p2');
            setTimeout(() => show('p3'), 5000);
        } else { alert("Details sahi dalo!"); }
    }

    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function start(m) {
        mode = m; s=0; ox=350; py=320;
        show('p4'); can.style.display='block';
        can.width=300; can.height=400; gA=true;
        loop();
    }

    function loop() {
        if(!gA) return;
        ctx.clearRect(0,0,300,400);
        if(mode=='a') {
            ty += 4*td; if(ty>350 || ty<50) td*=-1;
            ctx.fillStyle='red'; ctx.beginPath(); ctx.arc(250, ty, 30, 0, 7); ctx.fill();
            if(ash) { ax+=20; if(ax>230 && Math.abs(200-ty)<40) { s+=5; ax=50; ash=false; if(s>=10) ad(); } else if(ax>300) { ax=50; ash=false; } }
            ctx.fillStyle='gold'; ctx.fillRect(ax, 198, 30, 4);
        } else {
            pvy+=1; py+=pvy; if(py>320) py=320;
            ctx.fillStyle='#00f2ff'; ctx.fillRect(50, py, 35, 35);
            ox-=6; if(ox<-30) { ox=350; s+=5; if(s>=10) ad(); }
            ctx.fillStyle='red'; ctx.fillRect(ox, 330, 30, 30);
            if(ox<85 && ox>30 && py>295) ad();
        }
        document.getElementById('sc').innerText = "Score: "+s+"%";
        requestAnimationFrame(loop);
    }

    window.onmousedown = window.ontouchstart = (e) => { 
        if(!gA) return;
        if(mode=='a') ash=true;
        if(mode=='j' && py==320) pvy=-15;
    };

    function ad() {
        gA=false; show('p5');
        let t=5; let i = setInterval(() => {
            t--; document.getElementById('tm').innerText=t;
            if(t<=0) { clearInterval(i); res(); }
        }, 1000);
    }

    function res() {
        show('p6'); document.getElementById('fm').innerText = n + ", You Won " + s + "% Off!";
        confetti();
    }

    function sendWA() { window.location.href="https://wa.me/91"+mob+"?text=SCORE:"+s; }
</script>
</body>
</html>
