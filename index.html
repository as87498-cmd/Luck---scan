<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luck Loop Archery</title>
    <style>
        body { margin: 0; background: #000; color: gold; font-family: sans-serif; text-align: center; overflow: hidden; touch-action: none; }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: fixed; top:0; left:0; z-index: 100; }
        .visible { display: flex !important; }
        .box { border: 2px solid gold; padding: 20px; border-radius: 15px; width: 85%; background: #111; box-shadow: 0 0 20px rgba(255,215,0,0.3); }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid gold; background: #000; color: #fff; font-size: 16px; outline: none; }
        .btn { width: 95%; padding: 15px; background: gold; color: #000; font-weight: bold; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; margin-top:10px; }
        canvas { background: #001; border: 2px solid #333; width: 320px; height: 400px; margin-top: 10px; border-radius: 10px; }
        .ad-img { width: 85%; border: 2px solid gold; border-radius: 15px; margin: 10px 0; max-height: 50vh; object-fit: contain; background: #222; }
    </style>
</head>
<body>

    <div id="s1" class="screen visible">
        <div class="box">
            <h1>LUCK LOOP</h1>
            <input type="text" id="p_name" placeholder="YOUR NAME">
            <input type="tel" id="p_mob" placeholder="MOBILE NUMBER">
            <button class="btn" onclick="startFlow()">START MISSION</button>
        </div>
    </div>

    <div id="s_pre" class="screen">
        <div class="box">
            <h2 style="color:cyan;">EGG PLANET</h2>
            <img src="0be375d6-cfec-4bc4-a707-c3c863b278e0.png" class="ad-img" id="eggImg" onerror="this.src='https://via.placeholder.com/300x400?text=AD+IMAGE+MISSING';">
            <h3>Loading... <span id="pre_t">5</span>s</h3>
        </div>
    </div>

    <div id="s2" class="screen">
        <div style="background:rgba(0,0,0,0.8); width:100%; padding: 5px;">
            <h3 id="info">ARROWS: 5 | SCORE: 0</h3>
        </div>
        <canvas id="c" width="320" height="400"></canvas>
    </div>

    <div id="s_post" class="screen">
        <div class="box">
            <h2 style="color:cyan;">SHIVAY FINANCE</h2>
            <img src="00d36208-3e40-4401-bb90-a76b38fa74cf.png" class="ad-img" onerror="this.src='https://via.placeholder.com/300x400?text=AD+IMAGE+MISSING';">
            <h3>Reward Loading... <span id="post_t">5</span>s</h3>
        </div>
    </div>

    <div id="s3" class="screen">
        <div class="box">
            <h1 style="color:gold;">WINNER! 🎉</h1>
            <p id="winP" style="font-size:22px; color:white; white-space: pre-line;"></p>
            <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

<script>
    const cv = document.getElementById('c');
    const ctx = cv.getContext('2d');
    let pName, score=0, arrows=5, playing=false;
    let tx=160, tDir=3, ay=350, shooting=false;

    function startFlow() {
        pName = document.getElementById('p_name').value;
        let m = document.getElementById('p_mob').value;
        if(pName && m.length >= 10) {
            document.getElementById('s1').classList.remove('visible');
            document.getElementById('s_pre').classList.add('visible');
            let t = 5;
            let itv = setInterval(() => {
                t--; document.getElementById('pre_t').innerText = t;
                if(t <= 0) { clearInterval(itv); runGame(); }
            }, 1000);
        } else { alert("Data sahi dalo bhai!"); }
    }

    function runGame() {
        document.getElementById('s_pre').classList.remove('visible');
        document.getElementById('s2').classList.add('visible');
        playing = true;
        update();
    }

    function update() {
        if(!playing) return;
        ctx.clearRect(0,0,320,400);

        tx += tDir;
        if(tx > 280 || tx < 40) tDir *= -1;
        
        ctx.beginPath(); ctx.fillStyle="red"; ctx.arc(tx, 60, 35, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.fillStyle="white"; ctx.arc(tx, 60, 20, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.fillStyle="yellow"; ctx.arc(tx, 60, 8, 0, 7); ctx.fill();

        if(shooting) {
            ay -= 15;
            ctx.fillStyle = "white"; ctx.fillRect(158, ay, 4, 30);
            if(ay < 85 && Math.abs(160 - tx) < 35) {
                score += (40 - Math.floor(Math.abs(160 - tx))); 
                shooting = false; ay = 350; arrows--;
            } else if(ay < 0) { shooting = false; ay = 350; arrows--; }
        } else {
            ctx.fillStyle = "gray"; ctx.fillRect(158, 350, 4, 30); 
        }

        document.getElementById('info').innerText = "ARROWS: " + arrows + " | SCORE: " + score;
        if(arrows > 0) requestAnimationFrame(update);
        else { playing = false; showShivay(); }
    }

    window.onclick = window.ontouchstart = () => { if(playing && !shooting && arrows > 0) shooting = true; };

    function showShivay() {
        document.getElementById('s2').classList.remove('visible');
        document.getElementById('s_post').classList.add('visible');
        let t = 5;
        let itv = setInterval(() => {
            t--; document.getElementById('post_t').innerText = t;
            if(t <= 0) { clearInterval(itv); showResult(); }
        }, 1000);
    }

    function showResult() {
        document.getElementById('s_post').classList.remove('visible');
        document.getElementById('s3').classList.add('visible');
        let d = Math.min(Math.floor(score/6), 25);
        document.getElementById('winP').innerText = pName + "!\nScore: " + score + "\nDiscount: " + d + "% OFF";
    }
</script>
</body>
</html>
