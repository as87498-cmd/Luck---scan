<script>
    // Game Variables for Runner
    let playerY = 320, playerVY = 0, isJumping = false;
    let obstacles = [];
    let gameSpeed = 5;
    let frameCount = 0;

    function runnerLoop() {
        if(!active) return;
        ctx.clearRect(0,0,320,420);

        // 1. Gravity & Jump Physics
        playerVY += 0.8; // Gravity
        playerY += playerVY;
        if(playerY > 320) {
            playerY = 320;
            playerVY = 0;
            isJumping = false;
        }

        // 2. Draw Player (Neon Runner)
        ctx.fillStyle = '#00f2ff';
        ctx.shadowBlur = 15; ctx.shadowColor = '#00f2ff';
        ctx.fillRect(50, playerY, 35, 35); // Ye hamara 'Runner' hai
        ctx.shadowBlur = 0;

        // 3. Ground Line
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, 355); ctx.lineTo(320, 355); ctx.stroke();

        // 4. Generate Obstacles (Temple Run ki rukawatein)
        if(frameCount % 80 === 0) {
            obstacles.push({ x: 350, w: 20 + Math.random()*30, h: 30 + Math.random()*20 });
        }

        // 5. Move & Draw Obstacles
        ctx.fillStyle = '#ff0055';
        for(let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= gameSpeed;
            ctx.fillRect(obstacles[i].x, 355 - obstacles[i].h, obstacles[i].w, obstacles[i].h);

            // Collision Detection (Hit ho gaya toh game khatam)
            if(obstacles[i].x < 85 && obstacles[i].x + obstacles[i].w > 50 && playerY + 35 > 355 - obstacles[i].h) {
                triggerAd(); // Ad chal jayegi hit hote hi
                obstacles = [];
                return;
            }

            // Score badhao
            if(obstacles[i].x < 0) {
                obstacles.splice(i, 1);
                score += 2;
                if(score % 10 === 0) gameSpeed += 0.5; // Speed badhti jayegi
            }
        }

        frameCount++;
        document.getElementById('curScore').innerText = score;
        requestAnimationFrame(runnerLoop);
    }

    // Input Control
    window.ontouchstart = () => {
        if(active && !isJumping) {
            playerVY = -15; // Jump power
            isJumping = true;
        }
    };
</script>
