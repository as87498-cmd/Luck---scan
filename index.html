<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luck Loop Hub Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
        :root { --gold: #FFD700; --dark: #02050a; --neon: #00f2ff; }
        
        body { font-family: 'Orbitron', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; }

        /* Simple Screen Management */
        .screen { position: fixed; top:0; left:0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .active { display: flex !important; }

        /* Login Box - No Rotation, Pure Touch Friendly */
        .glass-box { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 30px; border-radius: 25px; 
            border: 2px solid var(--gold); 
            width: 80%; max-width: 320px; text-align: center;
        }

        .poster-img { width: 85%; max-width: 320px; border-radius: 15px; border: 3px solid var(--gold); box-shadow: 0 0 20px #000; }

        .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; }
        .game-btn { background: rgba(255,255,255,0.1); border: 2px solid var(--neon); padding: 20px 10px; border-radius: 15px; cursor: pointer; text-align: center; }

        /* Form Inputs */
        input { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; 
            background: #000; color: #fff; border: 1px solid var(--gold); 
            font-family: 'Orbitron'; box-sizing: border-box; font-size: 16px; 
            display: block; position: relative; z-index: 20;
        }

        .btn-action { 
            width: 100%; padding: 16px; background: var(--gold); color: #000; 
            font-weight: 900; border: none; border-radius: 10px; cursor: pointer; 
            font-size: 18px; margin-top: 10px; display: block; position: relative; z-index: 20;
        }

        canvas { background: radial-gradient(#1a2e1e, #02050a); display: none; border: 2px solid #444; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="glass-box">
            <h1 style="color: var(--gold); margin:0; font-size: 28px;">LUCK LOOP</h1>
            <p style="font-size: 10px; color: var(--neon); margin-bottom: 15px;">PREMIUM HUB</p>
            <input type="text" id="custName" placeholder="NAME">
            <input type="tel" id="custMobile" placeholder="MOBILE">
            <button class="btn-action" onclick="goToIntro()">ENTER</button>
        </div>
    </div>

    <div id="egg-planet-screen" class="screen">
        <img src="0be375d6-cfec-4bc4-a707-c3c863b278e0.png" class="poster-img">
        <p style="margin-top:15px; font-weight:bold; color: var(--neon);">Loading Arena...</p>
    </div>

    <div id="hub-screen" class="screen">
        <h2 style="color: var(--gold); margin-bottom:20px;">GAMES</h2>
        <div class="hub-grid">
            <div class="game-btn" onclick="startGame('archery')">🏹<br>ARCHERY</div>
            <div class="game-btn" onclick="startGame('jump')">🚀<br>JUMP</div>
        </div>
    </div>

    <div id="game-area" class="screen">
        <div style="font-size: 22px; color: var(--gold); margin-bottom:10px;">SCORE: <span id="scoreVal">0</span>%</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="ad-screen" class="screen">
        <img src="00d36208-3e40-4401-bb90-a76b38fa74cf.png" class="poster-img">
        <p style="color:#aaa; margin-top:10px;">Generating Coupon: <span id="timer">5</span>s</p>
    </div>

    <div id="result-screen" class="screen">
        <h1 style="color:var(--gold); font-size:35px;">WINNER! 🎉</h1>
        <p id="final-msg" style="font-size:18px; font-weight:bold;"></p>
        <button class="btn-action" onclick="sendWhatsApp()" style="width:80%;">GET COUPON</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let name, mobile, score = 0, gameActive = false, mode = '';
    let targetY = 100, targetDir = 1, arrowX = 80, isShooting = false;
    let playerY = 320, playerVY = 0, obsX = 400;

    function goToIntro() {
        name = document.getElementById('custName').value;
        mobile = document.getElementById('custMobile').value;
        if (name && mobile.length === 10) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('egg-planet-screen').classList.add('active');
            setTimeout(() => {
                document.getElementById('egg-planet-screen').classList.remove('active');
                document.getElementById('hub-screen').classList.add('active');
            }, 5000);
        } else { alert("Name aur 10-digit Mobile Number dalo!"); }
    }

    function startGame(m) {
        mode = m; score = 0; obsX = 400; playerY = 320;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('game-area').classList.add('active');
        canvas.style.display = 'block';
        canvas.width = 300; canvas.height = 400;
        gameActive = true;
        update();
    }

    function update() {
        if(!gameActive) return;
        ctx.clearRect(0,0,canvas.width, canvas.height);
        if(mode === 'archery') {
            targetY += 4 * targetDir;
            if(targetY > 350 || targetY < 50) targetDir *= -1;
            ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(250, targetY, 30, 0, Math.PI*2); ctx.fill();
            if(isShooting) {
                arrowX += 20;
                if(arrowX > 220 && Math.abs(200 - targetY) < 40) { 
                    score += 5; arrowX = 80; isShooting = false;
                    if(score >= 10) triggerAd();
                } else if(arrowX > 320) { arrowX = 80; isShooting = false; }
            }
            ctx.fillStyle = "gold"; ctx.fillRect(arrowX-30, 198, 30, 4);
        } else if (mode === 'jump') {
            playerVY += 1; playerY += playerVY;
            if(playerY > 320) playerY = 320;
            ctx.fillStyle = "#00f2ff"; ctx.fillRect(50, playerY, 35, 35);
            obsX -= 6;
            if(obsX < -30) { obsX = 350; score += 5; if(score >= 10) triggerAd(); }
            ctx.fillStyle = "red"; ctx.fillRect(obsX, 325, 30, 30);
            if(obsX < 85 && obsX > 30 && playerY > 295) triggerAd();
        }
        document.getElementById('scoreVal').innerText = score;
        requestAnimationFrame(update);
    }

    window.onmousedown = (e) => { handleInp(e); };
    window.ontouchstart = (e) => { handleInp(e); };
    function handleInp(e) {
        if(!gameActive) return;
        if(mode === 'archery') isShooting = true;
        if(mode === 'jump' && playerY === 320) playerVY = -15;
    }

    function triggerAd() {
        gameActive = false;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('ad-screen').classList.add('active');
        let t = 5;
        let timer = setInterval(() => {
            t--; document.getElementById('timer').innerText = t;
            if(t <= 0) { clearInterval(timer); showFinal(); }
        }, 1000);
    }

    function showFinal() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('final-msg').innerText = `${name}, Won ${score}% OFF!`;
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }

    function sendWhatsApp() {
        window.location.href = `https://wa.me/91${mobile}?text=LOOPSCORE:${score}`;
    }
</script>
</body>
</html>
