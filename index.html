<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luck Loop: Master Archery</title>
    <style>
        body { margin: 0; background: #050a10; color: gold; font-family: 'Segoe UI', sans-serif; text-align: center; overflow: hidden; touch-action: none; }
        .page { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: fixed; top:0; left:0; }
        .active { display: flex !important; }
        .box { border: 2px solid #FFD700; padding: 25px; border-radius: 20px; width: 85%; background: rgba(0,0,0,0.8); box-shadow: 0 0 20px gold; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid gold; background: #111; color: #fff; font-size: 16px; }
        .btn { width: 95%; padding: 15px; background: linear-gradient(to bottom, #FFD700, #b8860b); color: #000; font-weight: bold; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        canvas { background: radial-gradient(circle, #1a2a3a, #050a10); border: 3px solid #333; border-radius: 15px; width: 320px; height: 450px; }
        #timer-ui { font-size: 20px; color: #00f2ff; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="p1" class="page active">
        <div class="box">
            <h1 style="letter-spacing:3px;">ARCHERY KING</h1>
            <p style="color:#00f2ff;">TEST YOUR AIM, GET DISCOUNT!</p>
            <input type="text" id="un" placeholder="YOUR NAME">
            <input type="tel" id="um" placeholder="MOBILE NO">
            <button class="btn" id="startBtn">ENTER ARENA</button>
        </div>
    </div>

    <div id="p2" class="page">
        <div id="timer-ui">SCORE: <span id="sc">0</span> | ARROWS: <span id="arw">5</span></div>
        <canvas id="gv" width="320" height="450"></canvas>
        <p style="color:gold;">TAP TO SHOOT THE TARGET!</p>
    </div>

    <div id="p3" class="page">
        <h2 id="adMsg">CLAIMING REWARD... <span id="tm">5</span>s</h2>
        <div style="width:280px; height:350px; border:3px solid gold; background:#111; display:flex; align-items:center; justify-content:center; border-radius:15px;">
            <p>SHIVAY FINANCE<br>3D AD POSTER HERE</p>
        </div>
    </div>

    <div id="p4" class="page">
        <h1 style="color:gold; font-size:35px;">MISSION ACCOMPLISHED!</h1>
        <p id="rt" style="font-size:22px; color:white;"></p>
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>

<script>
    const cv = document.getElementById('gv');
    const ctx = cv.getContext('2d');
    let name, score=0, arrows=5, active=false;
    let targetX = 160, targetDir = 1, arrowY = 380, arrowX = 160, shooting = false;

    document.getElementById('startBtn').addEventListener('click', function() {
        name = document.getElementById('un').value;
        if(name && document.getElementById('um').value.length >= 10) {
            document.getElementById('p1').classList.remove('active');
            document.getElementById('p2').classList.add('active');
            active = true;
            render();
        } else { alert("Data dalo bhai!"); }
    });

    function drawTarget(x) {
        // Target Board (Professional Circles)
        const colors = ["white", "black", "blue", "red", "yellow"];
        for(let i=0; i<5; i++) {
            ctx.beginPath();
            ctx.fillStyle = colors[i];
            ctx.arc(x, 60, 40 - (i*7), 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = "gray"; ctx.stroke();
        }
    }

    function drawBow() {
        ctx.beginPath();
        ctx.strokeStyle = "gold"; ctx.lineWidth = 3;
        ctx.arc(160, 460, 60, Math.PI, 0); // Bow Shape
        ctx.stroke();
    }

    function render() {
        if(!active) return;
        ctx.clearRect(0, 0, 320, 450);

        // Target Movement
        targetX += 3 * targetDir;
        if(targetX > 270 || targetX < 50) targetDir *= -1;
        drawTarget(targetX);

        drawBow();

        // Arrow Logic
        if(shooting) {
            arrowY -= 12;
            ctx.fillStyle = "silver";
            ctx.fillRect(arrowX - 2, arrowY, 4, 30); // Arrow Body
            ctx.fillStyle = "red";
            ctx.beginPath(); ctx.moveTo(arrowX-5, arrowY); ctx.lineTo(arrowX+5, arrowY); ctx.lineTo(arrowX, arrowY-10); ctx.fill(); // Tip

            // Collision Check
            if(arrowY < 80 && arrowX > targetX - 40 && arrowX < targetX + 40) {
                let dist = Math.abs(arrowX - targetX);
                score += (40 - Math.floor(dist)); // Center hit = more points
                resetArrow();
            } else if (arrowY < 0) {
                resetArrow();
            }
        } else {
            // Arrow Ready in Bow
            ctx.fillStyle = "silver";
            ctx.fillRect(158, 380, 4, 30);
        }

        document.getElementById('sc').innerText = score;
        document.getElementById('arw').innerText = arrows;
        if(arrows > 0) requestAnimationFrame(render);
        else { active=false; showAd(); }
    }

    function resetArrow() {
        shooting = false; arrowY = 380; arrows--;
    }

    cv.addEventListener('touchstart', () => { if(!shooting && arrows > 0) shooting = true; });
    cv.addEventListener('mousedown', () => { if(!shooting && arrows > 0) shooting = true; });

        document.getElementById('p
