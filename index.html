<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luck Loop Runner</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: gold; font-family: sans-serif; text-align: center; overflow: hidden; touch-action: none; }
        .page { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: fixed; top:0; left:0; }
        .active { display: flex !important; }
        .box { border: 2px solid gold; padding: 20px; border-radius: 20px; width: 80%; background: rgba(255,255,0,0.05); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid gold; background: #222; color: #fff; }
        .btn { width: 90%; padding: 15px; background: gold; color: #000; font-weight: bold; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        canvas { background: #001; border: 2px solid #333; display: block; margin: 10px auto; touch-action: none; }
        img { width: 80%; border: 2px solid gold; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="p1" class="page active">
        <div class="box">
            <h1 style="margin:0;">LUCK LOOP</h1>
            <p style="color:cyan;">TEMPLE RUNNER</p>
            <input type="text" id="n" placeholder="NAME">
            <input type="tel" id="m" placeholder="MOBILE NO">
            <button class="btn" onclick="goP2()">START GAME</button>
        </div>
    </div>

    <div id="p2" class="page">
        <h2 id="sc">SCORE: 0</h2>
        <canvas id="gv"></canvas>
        <p style="color:cyan;">TAP TO JUMP!</p>
    </div>

    <div id="p3" class="page">
        <h2>REWARD LOADING... <span id="tm">5</span>s</h2>
        <img src="00d36208-3e40-4401-bb90-a76b38fa74cf.png" alt="Ad">
    </div>

    <div id="p4" class="page">
        <h1 style="font-size: 40px;">WINNER! 🎉</h1>
        <p id="resTxt"></p>
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>

<script>
    const cv = document.getElementById('gv');
    const ctx = cv.getContext('2d');
    let nm, mob, score=0, active=false;
    let py=150, pvy=0, obs=[], frame=0, spd=4;

    function goP2() {
        nm = document.getElementById('n').value;
        mob = document.getElementById('m').value;
        if(nm && mob.length >= 10) {
            document.getElementById('p1').classList.remove('active');
            document.getElementById('p2').classList.add('active');
            cv.width = 300; cv.height = 250;
            active = true;
            loop();
        } else { alert("Data sahi dalo bhai!"); }
    }

    function loop() {
        if(!active) return;
        ctx.clearRect(0,0,300,250);

        // Player Logic
        pvy += 0.8; py += pvy;
        if(py > 180) { py = 180; pvy = 0; }
        
        // Draw Runner
        ctx.fillStyle = "cyan";
        ctx.fillRect(40, py, 30, 30);

        // Ground
        ctx.fillStyle = "gold";
        ctx.fillRect(0, 210, 300, 5);

        // Obstacles
        if(frame % 70 === 0) obs.push({x:300, h:20 + Math.random()*30});
        ctx.fillStyle = "red";
        for(let i=obs.length-1; i>=0; i--) {
            obs[i].x -= spd;
            ctx.fillRect(obs[i].x, 210 - obs[i].h, 20, obs[i].h);

            // Collision
            if(obs[i].x < 70 && obs[i].x > 20 && py + 30 > 210 - obs[i].h) {
                active = false;
                showAd();
            }
            if(obs[i].x < -20) { obs.splice(i,1); score += 5; spd += 0.1; }
        }

        document.getElementById('sc').innerText = "SCORE: " + score;
        frame++;
        requestAnimationFrame(loop);
    }

    window.onclick = window.ontouchstart = () => { if(py >= 180) pvy = -12; };

        document.getElementById
