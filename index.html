<html lang="hi">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
        body { margin: 0; background: #02050a; color: white; font-family: 'Orbitron', sans-serif; text-align: center; overflow: hidden; touch-action: none; }
        .page { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: fixed; top:0; left:0; z-index: 10; }
        .active { display: flex !important; }
        
        /* Premium UI */
        .box { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; border: 2px solid #FFD700; width: 85%; max-width: 350px; backdrop-filter: blur(10px); }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid gold; background: #000; color: #fff; box-sizing: border-box; font-family: 'Orbitron'; }
        .btn { width: 100%; padding: 18px; background: #FFD700; color: #000; font-weight: 900; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 0 #b8860b; }
        
        .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; }
        .game-card { background: rgba(255,255,255,0.05); border: 2px solid #00f2ff; padding: 20px 10px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        
        img.poster { width: 90%; border-radius: 20px; border: 3px solid gold; box-shadow: 0 0 30px #000; }
        canvas { background: radial-gradient(#1a2e1e, #02050a); border-radius: 20px; display: none; margin-top: 10px; border: 2px solid #333; }
        
        #score-tag { font-size: 24px; color: gold; text-shadow: 0 0 10px gold; margin-bottom: 10px; }
    </style>
</head>

    <div id="result" class="page">
